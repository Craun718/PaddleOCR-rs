name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check --locked

  # ── 各平台 release 构建（并行，各跑在正确的 OS 上） ──────────────
  build-release:
    name: Build (${{ matrix.name }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output_file: libpaddleocr_rs_onnx.so
            output_dir: target/x86_64-unknown-linux-gnu/release
            format: tar
          - name: x86_64-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            output_file: paddleocr_rs_onnx.dll
            output_dir: target/x86_64-pc-windows-msvc/release
            format: zip
            setup_msvc: true
          - name: aarch64-macos
            os: macos-latest
            target: aarch64-apple-darwin
            output_file: libpaddleocr_rs_onnx.dylib
            output_dir: target/aarch64-apple-darwin/release
            format: tar
          - name: aarch64-android
            os: ubuntu-latest
            target: aarch64-linux-android
            output_file: libpaddleocr_rs_onnx.so
            output_dir: target/aarch64-linux-android/release
            format: tar
            setup_android: true
            extra_args: "--features ffi"
          - name: aarch64-ios
            os: macos-latest
            target: aarch64-apple-ios
            output_file: libpaddleocr_rs_onnx.a
            output_dir: target/aarch64-apple-ios/release
            format: tar
            extra_args: "--features ffi"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC
        if: matrix.setup_msvc
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Android NDK
        if: matrix.setup_android
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Configure Android linker
        if: matrix.setup_android
        run: |
          mkdir -p .cargo
          printf '[target.aarch64-linux-android]\nlinker = "%s/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android35-clang"\n' "$ANDROID_NDK_HOME" > .cargo/config.toml

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }} ${{ matrix.extra_args }}

      - name: Package (tar)
        if: matrix.format == 'tar'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          tar -czf "dist/paddleocr-rs-${TAG}-${{ matrix.name }}.tar.gz" \
            -C "${{ matrix.output_dir }}" "${{ matrix.output_file }}"

      - name: Package (zip)
        if: matrix.format == 'zip'
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p dist
          cd "${{ matrix.output_dir }}"
          7z a "${GITHUB_WORKSPACE}/dist/paddleocr-rs-${TAG}-${{ matrix.name }}.zip" "${{ matrix.output_file }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: dist/

  # ── 收集所有产物，创建 GitHub Release ──────────────────────────
  release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/
          merge-multiple: true

      - name: Package source tarball
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          tar -czf "dist/paddleocr-rs-${TAG}-src.tar.gz" \
            --exclude='.git' --exclude='target' \
            -C "$GITHUB_WORKSPACE" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  # ── 发布到 crates.io ──────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
