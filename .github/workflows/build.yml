name: build

on:
    push:
        branches: ["main", "master"]
        tags: ["v*"]
    pull_request:
        branches: ["main", "master"]

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Cargo Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo registry & build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Check
              run: cargo check --locked

    build:
        name: Build (${{ matrix.os }})
        needs: check
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                    - os: macos-latest
                      target: aarch64-apple-darwin
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo registry & build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Build
              run: cargo build --locked

    release:
        name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        needs: [check, build]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Get tag
              id: tag
              run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

            # ---------- Linux x86_64 ----------
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-gnu

            - name: Build Linux release
              run: cargo build --locked --release --target x86_64-unknown-linux-gnu

            - name: Package Linux
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  mkdir -p release
                  tar -czf "release/paddleocr-rs-${TAG}-x86_64-linux.tar.gz" \
                    -C target/x86_64-unknown-linux-gnu/release \
                    paddleocr_rs_onnx

            # ---------- Windows x86_64 ----------
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - name: Build Windows release
              run: cargo build --locked --release --target x86_64-pc-windows-msvc

            - name: Package Windows
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  cd target/x86_64-pc-windows-msvc/release
                  7z a "../../release/paddleocr-rs-${TAG}-x86_64-windows.zip" paddleocr_rs_onnx.exe
                  cd "$GITHUB_WORKSPACE"

            # ---------- macOS aarch64 ----------
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin

            - name: Build macOS release
              run: cargo build --locked --release --target aarch64-apple-darwin

            - name: Package macOS
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  tar -czf "release/paddleocr-rs-${TAG}-aarch64-macos.tar.gz" \
                    -C target/aarch64-apple-darwin/release \
                    paddleocr_rs_onnx

            # ---------- Source tarball ----------
            - name: Package source
              shell: bash
              run: |
                  TAG="${{ steps.tag.outputs.tag }}"
                  tar -czf "release/paddleocr-rs-${TAG}-src.tar.gz" \
                    --exclude='.git' --exclude='target' \
                    -C "$GITHUB_WORKSPACE" .

            # ---------- Publish ----------
            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: release/*

